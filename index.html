<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>樂森良選 Lifestyle Select</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --primary: #d32f2f; 
            --accent: #ffb300; 
            --app-bg: #fffdf5; 
            --body-bg: #f0f2f5; 
            --text-dark: #3e2723; 
        }
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--body-bg); 
            color: var(--text-dark); 
            margin: 0;
            overflow-x: hidden; 
        }
        
        .app-layout {
            max-width: 768px; 
            margin: 0 auto;   
            background-color: var(--app-bg);
            min-height: 100vh; 
            box-shadow: 0 0 25px rgba(0,0,0,0.05); 
            position: relative;
            padding-bottom: 90px; 
        }

        .marquee-container { background: #ffc107; color: #000; padding: 10px 0; overflow: hidden; white-space: nowrap; position: relative; z-index: 1030; font-size: 1rem; font-weight: 900; border-bottom: 2px solid #000; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background: #fff; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; overflow: hidden; }
        .dog-wrapper { position: relative; width: 100%; height: 180px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; }
        .loader-img { position: absolute; width: 180px; height: auto; object-fit: contain; animation: runRightToLeft 7s linear infinite; }
        .main-dog { z-index: 10; opacity: 1; }
        .ghost-1 { z-index: 9; opacity: 0.6; animation-delay: -0.15s; filter: blur(1px); }
        .ghost-2 { z-index: 8; opacity: 0.3; animation-delay: -0.3s; filter: blur(2px); }
        .ghost-3 { z-index: 7; opacity: 0.1; animation-delay: -0.45s; filter: blur(4px); }
        @keyframes runRightToLeft { 0% { transform: translateX(120vw); } 100% { transform: translateX(-120vw); } }
        
        .banner-wrapper { padding: 15px 15px 5px 15px; text-align: center; }
        .responsive-banner { width: 100%; max-height: 250px; object-fit: contain; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .quick-menu { 
            background: #fff; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; 
            padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            margin: 10px 15px 15px 15px; position: relative; z-index: 10;
        }
        .menu-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.1s; }
        .menu-item:active { transform: scale(0.95); opacity: 0.8; }
        .menu-btn-img { width: 56px; height: 56px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.08)); border-radius: 50%; }
        
        #member-btn-img {
            object-fit: cover; transform: scale(0.85); border: 2.5px solid #2d2d2d; 
            background-color: #fff; padding: 2px; box-sizing: border-box;
        }

        .menu-label { font-size: 0.8rem; font-weight: 700; color: var(--text-dark); text-align: center; line-height: 1.2; }
        @media (min-width: 768px) { .menu-btn-img { width: 68px; height: 68px; } }

        .sticky-header-group { position: sticky; top: 0; z-index: 1010; background: var(--app-bg); }
        .sticky-msg-bar { background-color: #ffe0b2; color: #e65100; font-size: 0.9rem; font-weight: bold; text-align: center; padding: 8px 10px; border-bottom: 1px solid rgba(0,0,0,0.05); display: none; }
        .cat-nav { display: flex; overflow-x: auto; white-space: nowrap; padding: 12px 15px; gap: 8px; background: rgba(255, 253, 245, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .cat-nav::-webkit-scrollbar { display: none; }
        .cat-pill { padding: 6px 16px; background: #fff; color: var(--text-dark); border: 1px solid #e0e0e0; border-radius: 20px; font-size: 0.9rem; font-weight: 700; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        .cat-pill.active { background: var(--text-dark); color: var(--accent); border-color: var(--text-dark); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        
        .content-wrapper { padding: 10px 15px; }
        .section-title { font-weight: 800; margin: 10px 0 15px 0; padding-left: 12px; border-left: 5px solid var(--accent); font-size: 1.2rem; color: var(--text-dark); }
        .product-card { background: #fff; border-radius: 15px; overflow: hidden; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.04); margin-bottom: 15px; position: relative; }
        .product-img { width: 100%; height: 140px; object-fit: cover; background: #f9f9f9; }
        .product-body { padding: 12px; position: relative; }
        .product-name { font-size: 0.95rem; font-weight: bold; margin-bottom: 5px; color: #4e342e; }
        .product-price { color: var(--primary); font-size: 1.1rem; font-weight: 900; }
        .stock-info { font-size: 0.75rem; color: #888; background: #f5f5f5; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 4px; }
        .badge-corner { position: absolute; top: 0; right: 0; background: #d32f2f; color: white; font-size: 0.8rem; font-weight: bold; padding: 5px 10px; border-bottom-left-radius: 10px; z-index: 10; box-shadow: -2px 2px 5px rgba(0,0,0,0.2); }
        .product-card.oos-mode .product-img { opacity: 0.5; filter: grayscale(100%); }
        
        .btn-add-only { position: absolute; bottom: 10px; right: 10px; width: 32px; height: 32px; background: var(--accent); color: var(--text-dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.15); cursor: pointer; }
        .qty-group { position: absolute; bottom: 10px; right: 10px; display: flex; align-items: center; background: #fff; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); border: 1px solid var(--accent); }
        .qty-btn { width: 28px; height: 28px; border: none; background: var(--accent); color: var(--text-dark); font-weight: bold; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; }
        .qty-val { font-size: 0.9rem; font-weight: bold; width: 24px; text-align: center; }
        
        .cart-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(150%); width: 90%; max-width: 700px; background: rgba(62, 39, 35, 0.95); color: #ffffff; border-radius: 50px; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1050; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid #ffb300; box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.3), 0 10px 20px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .cart-bar.show { transform: translateX(-50%) translateY(0); }
        .cart-bar-total { color: #ffb300; font-weight: 900; font-size: 1.25rem; }
        .btn-confirm { background: var(--primary); color: white; border: none; font-weight: bold; box-shadow: 0 4px 10px rgba(211, 47, 47, 0.3); }
        
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; cursor: zoom-out; }
        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 8px; transform: scale(0.9); transition: 0.3s; }
        #lightbox.show img { transform: scale(1); }
        .order-item-list { list-style: none; padding: 0; margin: 5px 0; }
        .order-item-list li { padding: 4px 0; border-bottom: 1px dashed #eee; font-size: 0.95rem; display: flex; justify-content: space-between; }
        .order-item-list li:last-child { border-bottom: none; }
        .item-qty-badge { background-color: #3e2723; color: #ffb300; padding: 1px 6px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .variant-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .variant-row:last-child { border-bottom: none; }
        .qty-stepper { display: flex; align-items: center; background: #f8f9fa; border-radius: 20px; border: 1px solid #ddd; }
        .step-btn { width: 30px; height: 30px; border: none; background: transparent; color: #333; font-weight: bold; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .step-val { width: 30px; text-align: center; font-weight: bold; font-size: 1rem; }
        .variant-tag { font-size: 0.75rem; background: #dc3545; color: white; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        .cart-item-row.clearance-item { background-color: #fff3cd; border-left: 5px solid #dc3545; padding-left: 10px; margin-bottom: 4px; border-radius: 4px; }
        .item-index { font-weight: 900; color: #aaa; min-width: 25px; font-size: 1rem; }
        .clearance-badge { font-size: 0.8rem; background: #dc3545; color: white; padding: 2px 6px; border-radius: 4px; margin-right: 5px; font-weight: bold; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="loader"><div class="dog-wrapper"><img src="https://drive.google.com/thumbnail?id=1-bdeExYe6cZArJ6G_f3oO3qmu4TfXGK_&sz=w1000" class="loader-img ghost-3" referrerpolicy="no-referrer"><img src="https://drive.google.com/thumbnail?id=1-bdeExYe6cZArJ6G_f3oO3qmu4TfXGK_&sz=w1000" class="loader-img ghost-2" referrerpolicy="no-referrer"><img src="https://drive.google.com/thumbnail?id=1-bdeExYe6cZArJ6G_f3oO3qmu4TfXGK_&sz=w1000" class="loader-img ghost-1" referrerpolicy="no-referrer"><img src="https://drive.google.com/thumbnail?id=1-bdeExYe6cZArJ6G_f3oO3qmu4TfXGK_&sz=w1000" class="loader-img main-dog" alt="Loading" referrerpolicy="no-referrer"></div><div class="spinner-border text-warning" role="status"></div><div class="mt-2 text-secondary fw-bold small">樂森良選 為您服務...</div></div>

<div class="app-layout">

    <div class="banner-wrapper">
        <img src="https://drive.google.com/thumbnail?id=1Htxmmsf4KyprRYI_3ZCBN99Pjk4Q5viq&sz=w2000" class="responsive-banner" id="hero-banner-img" alt="樂森良選" referrerpolicy="no-referrer">
    </div>

    <div class="quick-menu">
        <div class="menu-item" onclick="openCartModal()">
            <img src="https://drive.google.com/thumbnail?id=1xM2Zbn4YW06eGcmWPV0DTQG6yQlDgTAd&sz=w1000" class="menu-btn-img" referrerpolicy="no-referrer">
            <div class="menu-label">立即結帳</div>

            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" class="menu-btn-img" id="member-btn-img" referrerpolicy="no-referrer">

    <div class="sticky-header-group">

    <div class="content-wrapper">
        <div class="container-fluid px-0">
            <div id="product-container"></div>
        </div>
    </div>

</div> <div class="cart-bar" id="cart-bar" onclick="openCartModal()">

<div class="modal fade" id="announceModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0"><div class="modal-header border-0"><h5 class="modal-title fw-bold text-danger">📢 優惠活動 / 公告</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div id="announce-img-container" style="display:none;"></div><div id="announce-content" class="mt-2 text-center fw-bold text-dark"></div></div><div class="modal-footer border-0"><button type="button" class="btn btn-warning w-100 rounded-pill fw-bold text-dark shadow-sm py-2" data-bs-dismiss="modal">我知道了</button></div></div></div></div>
<div class="modal fade" id="myOrdersModal" tabindex="-1"><div class="modal-dialog modal-dialog-scrollable modal-lg"><div class="modal-content border-0"><div class="modal-header bg-light border-0"><h5 class="modal-title fw-bold">🐶 歷史訂單查詢</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body bg-light" id="my-orders-list"></div></div></div></div>
<div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt="放大圖片"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const LIFF_ID = "2009042792-5xuNohp3";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxD140v33ChZm1tQsuW1jbwd5R14QTGyeFHWBSU8zkg41ortc_9Zra3T4pF1lL-ZjyA/exec";
    const LINE_OA_ID = "@lawsonshop";

    let allData = {}; let cart = [];
    let userProfile = { userId: 'guest', displayName: '訪客' }; 
    let currentCategory = 'top10'; 
    let tempNormalQty = 0, tempClearanceQty = 0, tempProduct = null;
    let isLoggedIn = false; 
    let lastOrderText = ""; 

    const cartModal = new bootstrap.Modal(document.getElementById('cartModal'));
    const myOrdersModal = new bootstrap.Modal(document.getElementById('myOrdersModal'));
    const announceModal = new bootstrap.Modal(document.getElementById('announceModal'));
    const variantModal = new bootstrap.Modal(document.getElementById('variantModal'));
    const logoutModal = new bootstrap.Modal(document.getElementById('logoutModal'));
    const orderSuccessModal = new bootstrap.Modal(document.getElementById('orderSuccessModal'));

    window.onload = function() { 
        loadCartFromLocal(); 
        fetchMenu(); 
        initLiff(); 
    };

    async function initLiff() { 
        try { 
            await liff.init({ liffId: LIFF_ID }); 
            
            // 🟢 檢查是否有強制訪客的標記
            const forceGuest = localStorage.getItem('force_guest') === 'true';

            if (liff.isLoggedIn() && !forceGuest) { 
                const p = await liff.getProfile(); 
                userProfile = p; 
                isLoggedIn = true;
                updateUserUI(true);
            } else { 
                isLoggedIn = false;
                updateUserUI(false);
            } 
        } catch (e) { 
            console.error("LIFF Error:", e);
            isLoggedIn = false;
            updateUserUI(false);
        } 
    }

    function updateUserUI(isLogin) {
        const btnLabel = document.getElementById('member-btn-label');
        const btnImg = document.getElementById('member-btn-img');
        
        if(isLogin) {
            if(userProfile.pictureUrl) btnImg.src = userProfile.pictureUrl;
            if(btnLabel) btnLabel.innerText = "切換訪客"; 
        } else {
            btnImg.src = "https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg"; 
            if(btnLabel) btnLabel.innerText = "LINE 登入";
        }
    }

    function handleUserBlockClick() {
        if (!isLoggedIn) {
            loginWithLine();
        } else {
            logoutModal.show();
        }
    }

    // 🟢 修復：處理手機版登出崩潰與 LINE APP 內無法登出的問題
    function performLogout() {
        // 嘗試呼叫 LIFF 登出 (若在外部瀏覽器會生效)
        try { 
            if (liff.isLoggedIn()) liff.logout(); 
        } catch(e) {}
        
        // 設定強制訪客標記，這樣重新整理後即使在 LINE App 內也不會自動登入
        localStorage.setItem('force_guest', 'true');
        localStorage.removeItem('pos_cart'); 
        
        // 使用安全的重新載入，避免 iOS TypeError 崩潰
        window.location.reload(); 
    }

    // 🟢 修復：重新登入時清除強制訪客標記
    function loginWithLine() {
        localStorage.removeItem('force_guest');
        saveCartToLocal(); 
        liff.login({ redirectUri: window.location.href });
    }

    function saveCartToLocal() { localStorage.setItem('pos_cart', JSON.stringify(cart)); }
    function loadCartFromLocal() {
        const saved = localStorage.getItem('pos_cart');
        if (saved) {
            try { cart = JSON.parse(saved); updateCartUI(); } catch(e) { console.log("Cart load error"); }
        }
    }
    
    function fetchMenu() {
        fetch(GAS_URL + "?page=json&t=" + Date.now()).then(res => res.json()).then(data => {
                if (data.error) { alert("後端錯誤: " + data.message); return; }
                allData = data; 
                
                if(data.marqueeText && data.marqueeText.trim() !== "") { 
                    document.getElementById('marquee-text').innerText = data.marqueeText; 
                    document.getElementById('marquee-bar').style.display = 'block'; 
                }
                
                if(data.lastUpdateTime) { 
                    document.getElementById('stock-time').innerText = data.lastUpdateTime; 
                    document.getElementById('update-time-banner').style.display = 'block'; 
                }
                
                if (data.stickyMsg && data.stickyMsg.trim() !== "") {
                    const bar = document.getElementById('sticky-msg-bar');
                    bar.innerText = data.stickyMsg;
                    bar.style.display = 'block';
                } else {
                    document.getElementById('sticky-msg-bar').style.display = 'none';
                }

                if (data.homeBannerImg && data.homeBannerImg.trim() !== "") {
                    document.getElementById('hero-banner-img').src = data.homeBannerImg;
                }

                renderMenu(); checkAnnouncement(data); document.getElementById('loader').style.display = 'none';
        }).catch(err => { document.getElementById('loader').innerHTML = '<div class="text-danger p-4 text-center"><h3>載入失敗</h3><br>請檢查網路或聯繫管理員<br><small>' + err + '</small></div>'; });
    }

    function checkAnnouncement(data) { const hasText = data.announcementText && data.announcementText.trim() !== ""; const hasImg = data.announcementImg && data.announcementImg.trim() !== ""; if (hasText || hasImg) { document.getElementById('announce-content').innerText = data.announcementText || ""; const imgDiv = document.getElementById('announce-img-container'); if (hasImg) { imgDiv.innerHTML = `<img src="${data.announcementImg}" referrerpolicy="no-referrer" style="width:100%; border-radius:15px;">`; imgDiv.style.display = "block"; } else { imgDiv.innerHTML = ""; imgDiv.style.display = "none"; } announceModal.show(); } }
    function openSupport() { window.location.href = 'https://line.me/R/ti/p/@lawsonshop'; }
    function setCategory(cat) { currentCategory = cat; renderMenu(); }
    
    function renderMenu() {
        const nav = document.getElementById('cat-nav'); const container = document.getElementById('product-container');
        const hasClearanceItems = allData.products.some(p => Number(p.clearStock) > 0);
        let navHtml = `<span class="cat-pill ${currentCategory === 'top10' ? 'active' : ''}" onclick="setCategory('top10')">🔥 熱銷TOP10</span>`;
        if (hasClearanceItems) {
            navHtml += `<span class="cat-pill ${currentCategory === 'expiry' ? 'active' : ''}" onclick="setCategory('expiry')">⚠️ 即期良品</span>`;
        }
        navHtml += `<span class="cat-pill ${currentCategory === 'all' ? 'active' : ''}" onclick="setCategory('all')">全部商品</span>`;
        if (allData.categories) { allData.categories.forEach(cat => { navHtml += `<span class="cat-pill ${currentCategory === cat ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</span>`; }); }
        nav.innerHTML = navHtml; container.innerHTML = '';
        if (!allData.categories || allData.categories.length === 0) { container.innerHTML = '<div class="text-center mt-5 text-muted">目前沒有商品</div>'; return; }

        let items = [];
        if (currentCategory === 'top10') items = allData.products.filter(p => allData.top10.includes(p.name)); 
        else if (currentCategory === 'expiry') items = allData.products.filter(p => Number(p.clearStock) > 0); 
        else {
            allData.categories.forEach(cat => {
                if (currentCategory !== 'all' && currentCategory !== cat) return;
                const catItems = allData.products.filter(p => p.cat === cat); if(catItems.length === 0) return;
                let grouped = {}; catItems.forEach(p => { const sub = p.subCat || '其他'; if(!grouped[sub]) grouped[sub] = []; grouped[sub].push(p); });
                
                let html = `<div id="cat-${cat}" class="section-title w-100">${cat}</div>`;
                
                for (const [subName, subItems] of Object.entries(grouped)) {
                    if(subName && subName !== '' && subName !== '其他') {
                        html += `<div class="w-100 text-secondary small fw-bold mb-2 ms-2"><i class="bi bi-tag-fill me-1"></i>${subName}</div>`; 
                    }
                    html += `<div class="row g-3 g-md-4 mb-4">`; 
                    subItems.forEach(p => html += createProductCard(p)); 
                    html += `</div>`; 
                } 
                container.innerHTML += html;
            });
            return;
        }

        if (items.length === 0) { container.innerHTML = '<div class="text-center mt-5 text-muted">目前沒有相關商品</div>'; return; }
        
        let html = `<div class="section-title">${currentCategory === 'top10' ? '🔥 熱銷推薦' : '⚠️ 即期良品專區'}</div><div class="row g-3 g-md-4 mb-4">`;
        items.forEach(p => html += createProductCard(p)); 
        html += `</div>`;
        container.innerHTML = html;
    }

    function createProductCard(p) {
        const inCart = cart.find(c => c.name === p.name && c.cat === p.cat);
        const count = inCart ? inCart.count : 0; 
        const isOOS = p.status === 'oos' || (p.stock <= 0 && (!p.clearStock || Number(p.clearStock) <= 0));
        const imgHtml = p.img ? `<img src="${p.img}" class="product-img" onclick="zoomImg(event, '${p.img}')" referrerpolicy="no-referrer">` : `<div class="product-img d-flex align-items-center justify-content-center text-muted"><i class="bi bi-camera fs-1"></i></div>`;
        let stockHtml = `<span class="stock-info">剩: ${p.stock}</span>`;
        const hasClearanceOption = (Number(p.clearStock) > 0);
        let btnHtml = '';

        if (isOOS) {
            btnHtml = `<span class="badge bg-secondary position-absolute bottom-0 end-0 m-2">補貨中</span>`;
        } else if (hasClearanceOption) {
            btnHtml = `<div class="btn-add-only" style="width:auto; padding:0 12px; border-radius:20px; font-size:0.9rem;" onclick="openVariantModal('${p.name}', '${p.cat}')">選購</div>`;
        } else {
            btnHtml = (count > 0 ? `<div class="qty-group"><button class="qty-btn" onclick="updateQty('${p.name}', '${p.cat}', -1)">-</button><span class="qty-val">${count}</span><button class="qty-btn" onclick="updateQty('${p.name}', '${p.cat}', 1)">+</button></div>` : `<div class="btn-add-only" onclick="updateQty('${p.name}', '${p.cat}', 1)"><i class="bi bi-plus-lg"></i></div>`);
        }

        let cornerBadgeHtml = '';
        if (Number(p.clearStock) > 0) { 
            cornerBadgeHtml = `<div class="badge-corner">即期出清</div>`; 
        } 
        const cardClass = isOOS ? 'oos-mode' : ''; 
        
        return `
        <div class="col-6 col-md-4 col-lg-3">
            <div class="product-card ${cardClass}">
                <div class="position-relative overflow-hidden" style="border-radius: 15px 15px 0 0;">${cornerBadgeHtml}${imgHtml}</div>
                <div class="product-body">
                    <div class="product-name text-truncate">${p.name}</div>
                    <div class="product-price">$${p.price}</div>
                    ${stockHtml}
                    ${btnHtml}
                </div>
            </div>
        </div>`;
    }

    function openVariantModal(name, cat) {
        tempProduct = allData.products.find(x => x.name === name && x.cat === cat);
        if (!tempProduct) return;
        tempNormalQty = 0;
        tempClearanceQty = 0;
        document.getElementById('variant-title').innerText = tempProduct.name;
        renderVariantModal();
        variantModal.show();
    }

    function renderVariantModal() {
        const list = document.getElementById('variant-list');
        list.innerHTML = '';
        let dateStr = '';
        if (tempProduct.arrivalDate) {
            const d = new Date(tempProduct.arrivalDate);
            if (!isNaN(d.getTime())) { dateStr = `效期: ${(d.getMonth()+1)}/${d.getDate()}`; }
        }
        if (tempProduct.stock > 0) {
            list.innerHTML += `
            <div class="variant-row">
                <div class="flex-grow-1">
                    <div class="fw-bold">正常品 <small class="text-muted fw-normal">剩${tempProduct.stock}</small></div>
                    <div class="text-danger fw-bold">$${tempProduct.price}</div>
                </div>
                <div class="qty-stepper">
                    <button class="step-btn" onclick="updateTempQty('normal', -1)">-</button>
                    <div class="step-val">${tempNormalQty}</div>
                    <button class="step-btn" onclick="updateTempQty('normal', 1)">+</button>
                </div>
            </div>`;
        }
        if (Number(tempProduct.clearStock) > 0) {
            list.innerHTML += `
            <div class="variant-row">
                <div class="flex-grow-1">
                    <div class="fw-bold text-danger">即期品 <span class="variant-tag">${dateStr}</span></div>
                    <div class="text-danger fw-bold">$${tempProduct.clearPrice} <small class="text-muted fw-normal">剩${tempProduct.clearStock}</small></div>
                </div>
                <div class="qty-stepper">
                    <button class="step-btn" onclick="updateTempQty('clearance', -1)">-</button>
                    <div class="step-val">${tempClearanceQty}</div>
                    <button class="step-btn" onclick="updateTempQty('clearance', 1)">+</button>
                </div>
            </div>`;
        }
    }

    function updateTempQty(type, delta) {
        if (type === 'normal') {
            const newQty = tempNormalQty + delta;
            if (newQty >= 0 && newQty <= tempProduct.stock) tempNormalQty = newQty;
        } else {
            const newQty = tempClearanceQty + delta;
            if (newQty >= 0 && newQty <= tempProduct.clearStock) tempClearanceQty = newQty;
        }
        renderVariantModal();
    }

    function confirmVariantSelection() {
        if (tempNormalQty === 0 && tempClearanceQty === 0) {
            variantModal.hide();
            return;
        }
        if (tempNormalQty > 0) addToCart(tempProduct.name, tempProduct.cat, tempProduct.price, tempNormalQty);
        if (tempClearanceQty > 0) addToCart(tempProduct.name + " (即期品)", tempProduct.cat, tempProduct.clearPrice, tempClearanceQty);
        variantModal.hide();
    }

    function addToCart(name, cat, price, qty) {
        const idx = cart.findIndex(c => c.name === name && c.cat === cat);
        if (idx > -1) {
            cart[idx].count += qty;
        } else {
            cart.push({ name: name, price: price, cat: cat, count: qty });
        }
        updateCartUI();
        saveCartToLocal(); 
    }

    function updateQty(name, cat, delta) { 
        const product = allData.products.find(p => p.name === name && p.cat === cat);
        const idx = cart.findIndex(c => c.name === name && c.cat === cat); 
        if (delta > 0) {
            const currentQty = idx > -1 ? cart[idx].count : 0;
            if (currentQty >= product.stock) {
                alert(`庫存不足！目前剩餘 ${product.stock} 個`);
                return;
            }
        }
        if (idx > -1) { 
            cart[idx].count += delta;
            if (cart[idx].count <= 0) cart.splice(idx, 1); 
        } else if (delta > 0) { 
            cart.push({ name, price: product.price, cat, count: 1 });
        } 
        updateCartUI();
        saveCartToLocal(); 
        renderMenu(); 
        if(document.getElementById('cartModal').classList.contains('show')) renderCartModal(); 
    }

    function updateCartUI() { const total = cart.reduce((s, i) => s + (i.price * i.count), 0); const count = cart.reduce((s, i) => s + i.count, 0); document.getElementById('cart-count').innerText = count; document.getElementById('cart-total').innerText = '$' + total; document.getElementById('modal-cart-total').innerText = '$' + total; document.getElementById('cart-bar').classList.toggle('show', count > 0); if (count === 0) cartModal.hide(); }
    function openCartModal() { renderCartModal(); cartModal.show(); }
    
    function renderCartModal() { 
        const body = document.getElementById('cart-modal-body');
        const loginPrompt = document.getElementById('guest-login-prompt');
        const submitBtn = document.getElementById('btn-submit-order');
        if (isLoggedIn) {
            loginPrompt.style.display = 'none';
            submitBtn.innerText = "送出訂單";
            submitBtn.classList.remove('btn-secondary');
            submitBtn.classList.add('btn-confirm');
        } else {
            loginPrompt.style.display = 'block';
            submitBtn.innerText = "以訪客身分送單";
            submitBtn.classList.remove('btn-confirm');
            submitBtn.classList.add('btn-secondary');
        }
        if (cart.length === 0) { body.innerHTML = '<div class="text-center py-4 text-muted">購物車是空的</div>'; return; } 
        let html = ''; 
        cart.forEach((i, index) => {
            const isClearance = i.name.includes('(即期品)');
            const rowClass = isClearance ? 'cart-item-row clearance-item' : 'cart-item-row border-bottom';
            const badgeHtml = isClearance ? `<span class="clearance-badge">⚠️ 即期良品</span>` : ``;
            let dateInfo = '';
            if (isClearance) {
                const rawName = i.name.replace(" (即期品)", "");
                const p = allData.products.find(x => x.name === rawName && x.cat === i.cat);
                if (p && p.arrivalDate) {
                    const d = new Date(p.arrivalDate);
                    if (!isNaN(d.getTime())) { dateInfo = `<div class="small text-danger fw-bold"><i class="bi bi-calendar-event"></i> 效期：${d.getMonth()+1}/${d.getDate()}</div>`; }
                }
            }
            html += `
            <div class="d-flex justify-content-between align-items-center py-2 ${rowClass}">
                <div class="me-2 item-index">${index + 1}.</div>
                <div style="flex:1">
                    <div>${badgeHtml} <span class="fw-bold text-dark">${i.name.replace(" (即期品)", "")}</span></div>
                    ${dateInfo}
                    <small class="text-secondary fw-bold">$${i.price}</small>
                </div>
                <div class="d-flex align-items-center">
                    <button class="btn btn-sm btn-outline-warning text-dark border fw-bold rounded-circle" style="width:28px;height:28px;padding:0" onclick="updateQtyInCart('${i.name}','${i.cat}',-1)">-</button>
                    <span class="px-3 fw-bold">${i.count}</span>
                    <button class="btn btn-sm btn-warning text-dark fw-bold rounded-circle" style="width:28px;height:28px;padding:0" onclick="updateQtyInCart('${i.name}','${i.cat}',1)">+</button>
                </div>
            </div>`;
        });
        body.innerHTML = html;
    }

    function updateQtyInCart(displayName, cat, delta) {
        const rawName = displayName.replace(" (即期品)", "").trim();
        const product = allData.products.find(p => p.name === rawName && p.cat === cat);
        const isClearance = displayName.includes('(即期品)');
        const idx = cart.findIndex(c => c.name === displayName && c.cat === cat);
        const currentQty = idx > -1 ? cart[idx].count : 0;
        if (delta > 0 && product) {
            const maxStock = isClearance ? product.clearStock : product.stock;
            if (currentQty >= maxStock) {
                alert(`庫存不足！目前剩餘 ${maxStock} 個`);
                return;
            }
        }
        if (idx > -1) {
            cart[idx].count += delta;
            if (cart[idx].count <= 0) cart.splice(idx, 1);
        }
        updateCartUI();
        saveCartToLocal(); 
        renderCartModal();
    }
    
    function submitOrder() {
        const cName = document.getElementById('order-contact-name').value.trim(); const cPhone = document.getElementById('order-contact-phone').value.trim();
        if (!cName) { alert("請輸入取餐聯絡人姓名"); return; } if (!cPhone) { alert("請輸入聯絡電話"); return; }
        
        let confirmMsg = "確認送出訂單？";
        if (!isLoggedIn) {
            confirmMsg = "⚠️ 您目前是訪客身分，將無法收到訂單狀態通知。\n\n確定要送出嗎？";
        }

        if(!confirm(confirmMsg)) return;
        document.getElementById('loader').style.display = 'flex'; document.querySelector('#loader .fw-bold').innerText = "狗狗跑腿送單中..."; cartModal.hide();
        
        const itemsText = cart.map(i => `${i.name} x${i.count}`).join('\n');
        const totalPrice = cart.reduce((s, i) => s + (i.price * i.count), 0);
        lastOrderText = `📋 訂單通知\n\n訂購人: ${cName} / ${cPhone}\n下單時間: ${new Date().toLocaleString()}\n----------------\n${itemsText}\n----------------\n總金額: $${totalPrice}`;

        const orderData = { action: 'createOrder', order: { userId: userProfile.userId, displayName: userProfile.displayName, itemsStr: cart.map(i => `${i.name} x${i.count}`).join(', '), total: totalPrice, cartItems: cart, contactName: cName, contactPhone: cPhone } };
        
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(orderData), mode: 'no-cors' }).then(() => { 
            document.getElementById('loader').style.display = 'none';
            cart = []; 
            saveCartToLocal(); 
            updateCartUI(); 
            renderMenu(); 
            orderSuccessModal.show();
        }).catch(e => alert("錯誤: " + e));
    }

    function finishOrderProcess(action) {
        orderSuccessModal.hide();
        
        if (action === 'line') {
            navigator.clipboard.writeText(lastOrderText).then(() => {
                alert("✅ 訂單內容已複製！\n即將開啟 LINE 官方帳號，請直接貼上傳送。");
                window.location.href = `https://line.me/R/oaMessage/${LINE_OA_ID}/?${encodeURIComponent(lastOrderText)}`;
            }).catch(err => {
                alert("無法自動複製，請手動截圖傳送。");
                window.location.href = `https://line.me/R/ti/p/${LINE_OA_ID}`;
            });
        } else {
            window.location.reload();
        }
    }
    
    function zoomImg(e, url) { e.stopPropagation(); const lb = document.getElementById('lightbox'); document.getElementById('lightbox-img').src = url; lb.style.display = 'flex'; setTimeout(() => lb.classList.add('show'), 10); }
    function closeLightbox() { const lb = document.getElementById('lightbox'); lb.classList.remove('show'); setTimeout(() => lb.style.display = 'none', 300); }
    
    function openMyOrders() { 
        if(!isLoggedIn) { alert("請先登入 LINE 才能查詢訂單！"); return; }
        myOrdersModal.show(); document.getElementById('my-orders-list').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';
        fetch(GAS_URL + "?page=myOrders&uid=" + userProfile.userId + "&t=" + Date.now()).then(res => res.json()).then(orders => { 
            if(!orders || orders.length === 0) { document.getElementById('my-orders-list').innerHTML = '<div class="text-center py-5 text-muted"><i class="bi bi-clipboard-x fs-1 d-block mb-3"></i>尚無訂單紀錄</div>'; return; }
            let html = '';
            orders.forEach(o => {
                let itemsHtml = '<ul class="order-item-list">';
                const itemsArray = o.items.split(','); 
                itemsArray.forEach(itemStr => { 
                    const parts = itemStr.split(' x'); 
                    let name = parts[0].trim(); 
                    const qty = parts[1] ? parts[1].trim() : '1'; 
                    
                    let itemStyle = "";
                    if (name.includes('[缺貨]')) {
                        name = name.replace('[缺貨]', '').trim();
                        itemStyle = 'style="text-decoration: line-through; color: #dc3545;"';
                    } else if (name.includes('(即期品)')) {
                        itemStyle = 'class="text-danger fw-bold"';
                    }

                    itemsHtml += `<li><span ${itemStyle}>${name}</span><span class="item-qty-badge">x${qty}</span></li>`; 
                });
                itemsHtml += '</ul>';
                html += `<div class="card mb-3 border-0 shadow-sm"><div class="card-header bg-white d-flex justify-content-between align-items-center"><span class="badge ${o.status === '已完成' ? 'bg-success' : 'bg-warning text-dark'}">${o.status}</span><small class="text-secondary">${o.date}</small></div><div class="card-body p-3"><div class="d-flex justify-content-between align-items-center mb-2"><span class="fw-bold text-dark">#${o.id}</span><span class="text-danger fw-bold">$${o.total}</span></div><div class="bg-light p-2 rounded">${itemsHtml}</div></div></div>`;
            });
            document.getElementById('my-orders-list').innerHTML = html;
        }).catch(err => { document.getElementById('my-orders-list').innerHTML = '<div class="text-center text-danger py-5">載入失敗</div>'; });
    }
</script>
</body>
</html>
